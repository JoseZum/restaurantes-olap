# =============================================================================
# HDFS DataNode - Nodo de datos del sistema de archivos distribuido
# Almacena los bloques de datos reales en HDFS (Hadoop 3.2.1).
# Se despliega como StatefulSet para garantizar que cada replica
# mantenga su propio volumen persistente de bloques de datos.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hdfs-datanode
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: hdfs-datanode
    app.kubernetes.io/component: almacenamiento
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  # Servicio headless para StatefulSet
  clusterIP: None
  selector:
    app.kubernetes.io/name: hdfs-datanode
  ports:
    - name: data-transfer
      port: 9866
      targetPort: 9866
      protocol: TCP
    - name: web-ui
      port: 9864
      targetPort: 9864
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-datanode
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: hdfs-datanode
    app.kubernetes.io/component: almacenamiento
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  serviceName: hdfs-datanode
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hdfs-datanode
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hdfs-datanode
        app.kubernetes.io/component: almacenamiento
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Preferencia para distribuir DataNodes en nodos distintos al NameNode
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - hdfs-namenode
                topologyKey: kubernetes.io/hostname
      # Contenedor de inicializacion: esperar a que el NameNode este disponible
      initContainers:
        - name: esperar-namenode
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que HDFS NameNode este disponible..."
              until nc -z hdfs-namenode 9000; do
                echo "NameNode no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "NameNode disponible. Iniciando DataNode."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: datanode
          image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
          imagePullPolicy: IfNotPresent
          env:
            - name: CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: CLUSTER_NAME
            - name: CORE_CONF_fs_defaultFS
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: CORE_CONF_fs_defaultFS
          ports:
            - name: data-transfer
              containerPort: 9866
              protocol: TCP
            - name: web-ui
              containerPort: 9864
              protocol: TCP
          # Verificacion de salud via puerto de transferencia de datos
          livenessProbe:
            tcpSocket:
              port: 9866
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 9866
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: datanode-data
              mountPath: /hadoop/dfs/data
  # Plantilla para volumen persistente - almacena bloques de datos HDFS
  volumeClaimTemplates:
    - metadata:
        name: datanode-data
        labels:
          app.kubernetes.io/name: hdfs-datanode
          app.kubernetes.io/part-of: restaurantes-olap
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
