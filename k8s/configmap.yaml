# =============================================================================
# ConfigMap: Configuracion no sensible para todos los servicios OLAP
# Contiene variables de entorno, parametros de conexion y configuracion
# general para Hive, Spark, Airflow, Neo4j, Superset y Elasticsearch.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: olap-config
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: olap-config
    app.kubernetes.io/part-of: restaurantes-olap
    app.kubernetes.io/component: configuracion
data:
  # --- Configuracion de HDFS ---
  CLUSTER_NAME: "bd-restaurantes"
  CORE_CONF_fs_defaultFS: "hdfs://hdfs-namenode:9000"
  HADOOP_USER_NAME: "root"

  # --- Configuracion de Hive Metastore ---
  DATABASE_TYPE: "postgres"
  DATABASE_HOST: "postgres-metastore"
  DATABASE_PORT: "5432"
  DATABASE_DB: "metastore"
  DATABASE_USER: "hive"
  HIVE_METASTORE_URI: "thrift://hive:9083"

  # --- Configuracion de Spark ---
  SPARK_MODE_MASTER: "master"
  SPARK_MODE_WORKER: "worker"
  SPARK_MASTER_URL: "spark://spark-master:7077"
  SPARK_WORKER_CORES: "6"
  SPARK_WORKER_MEMORY: "18G"
  SPARK_WAREHOUSE: "hdfs://hdfs-namenode:9000/user/hive/warehouse"

  # --- Configuracion de Airflow ---
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
  PYTHONPATH: "/opt/airflow"

  # --- Configuracion de Neo4j ---
  NEO4J_dbms_memory_heap_max__size: "2G"
  NEO4J_dbms_memory_pagecache_size: "1G"
  NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
  NEO4J_dbms_security_procedures_allowlist: "gds.*,apoc.*"
  NEO4J_apoc_export_file_enabled: "true"
  NEO4J_apoc_import_file_enabled: "true"
  NEO4J_apoc_import_file_use__neo4j__config: "true"
  NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"

  # --- Configuracion de Elasticsearch ---
  discovery.type: "single-node"
  xpack.security.enabled: "false"
  ES_JAVA_OPTS: "-Xms512m -Xmx512m"

  # --- Configuracion de Superset ---
  SUPERSET_DATABASE_DIALECT: "postgresql"
  SUPERSET_DATABASE_USER: "superset"
  SUPERSET_DATABASE_HOST: "superset-db"
  SUPERSET_DATABASE_PORT: "5432"
  SUPERSET_DATABASE_DB: "superset"
  SUPERSET_REDIS_HOST: "superset-redis"
  SUPERSET_REDIS_PORT: "6379"

  # --- Configuracion de conexion OLTP (host/puerto/esquema, sin credenciales) ---
  POSTGRES_OLTP_HOST: "postgres-db"
  POSTGRES_OLTP_PORT: "5432"
  POSTGRES_OLTP_DB: "restaurantes"
