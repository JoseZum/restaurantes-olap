# =============================================================================
# Elasticsearch - Motor de busqueda y analitica de datos
# Elasticsearch 8.11.0 configurado en modo nodo unico para el entorno OLAP.
# Se utiliza para indexar y buscar datos analiticos procesados por Spark.
# Seguridad deshabilitada para entorno de desarrollo/academico.
# Se despliega como StatefulSet con volumen persistente de 20Gi.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-olap
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: elasticsearch-olap
    app.kubernetes.io/component: busqueda
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: elasticsearch-olap
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch-olap
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: elasticsearch-olap
    app.kubernetes.io/component: busqueda
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  serviceName: elasticsearch-olap
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch-olap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch-olap
        app.kubernetes.io/component: busqueda
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Contexto de seguridad: Elasticsearch requiere ejecutar como uid 1000
      securityContext:
        fsGroup: 1000
      # Contenedor de inicializacion: ajustar configuracion del kernel
      initContainers:
        - name: ajustar-sysctl
          image: busybox:1.36
          # Elasticsearch requiere vm.max_map_count alto para operar correctamente
          command:
            - sh
            - -c
            - |
              sysctl -w vm.max_map_count=262144 || true
              echo "Parametro vm.max_map_count ajustado (o ya configurado)."
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: ajustar-permisos
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /usr/share/elasticsearch/data
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          imagePullPolicy: IfNotPresent
          env:
            # Modo nodo unico (sin cluster multi-nodo)
            - name: discovery.type
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: discovery.type
            # Seguridad deshabilitada para entorno academico
            - name: xpack.security.enabled
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: xpack.security.enabled
            # Opciones de la JVM para controlar uso de memoria
            - name: ES_JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: ES_JAVA_OPTS
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          # Verificacion de salud usando el endpoint de salud del cluster
          livenessProbe:
            httpGet:
              path: /_cat/health
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_cat/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          # Sonda de arranque para dar tiempo a Elasticsearch de inicializarse
          startupProbe:
            httpGet:
              path: /_cat/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
  # Plantilla para volumen persistente de indices de Elasticsearch
  volumeClaimTemplates:
    - metadata:
        name: es-data
        labels:
          app.kubernetes.io/name: elasticsearch-olap
          app.kubernetes.io/part-of: restaurantes-olap
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
