# =============================================================================
# Apache Airflow - Orquestador de flujos de trabajo
# Compuesto por tres componentes:
#   1. airflow-init (Job): Inicializa la BD, crea usuario admin y conexiones
#   2. airflow-webserver (Deployment): Interfaz web en puerto 8080
#   3. airflow-scheduler (Deployment): Programador de tareas DAG
# Utiliza LocalExecutor con PostgreSQL como backend de metadatos.
# =============================================================================

# -----------------------------------------------------------------------------
# Job de inicializacion: ejecuta migracion de BD, creacion de usuario
# administrador y registro de conexiones (OLTP, Spark).
# Se ejecuta una sola vez antes de que el webserver y scheduler arranquen.
# -----------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: airflow-init
    app.kubernetes.io/component: orquestacion
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-init
        app.kubernetes.io/component: orquestacion
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      restartPolicy: OnFailure
      # Contenedor de inicializacion: esperar a que PostgreSQL Airflow este listo
      initContainers:
        - name: esperar-postgres-airflow
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que PostgreSQL Airflow este disponible..."
              until nc -z postgres-airflow 5432; do
                echo "PostgreSQL Airflow no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "PostgreSQL Airflow disponible."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: airflow-init
          # Imagen personalizada con provider de Spark y Java 17
          # En produccion, reemplazar con la URL del registro de contenedores
          image: restaurantes-olap-airflow:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW__WEBSERVER__SECRET_KEY
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__FERNET_KEY
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
            - name: _AIRFLOW_DB_UPGRADE
              value: "true"
            - name: _AIRFLOW_WWW_USER_CREATE
              value: "true"
            - name: _AIRFLOW_WWW_USER_USERNAME
              value: "admin"
            - name: _AIRFLOW_WWW_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW_ADMIN_PASSWORD
          # Comando de inicializacion: migrar BD, crear usuario, registrar conexiones
          command:
            - bash
            - -c
            - |
              airflow db init

              airflow users create \
                --username admin \
                --password "$_AIRFLOW_WWW_USER_PASSWORD" \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@example.com

              airflow connections add 'postgres_oltp' \
                --conn-type 'postgres' \
                --conn-host 'postgres-db' \
                --conn-port 5432 \
                --conn-schema 'restaurantes' \
                --conn-login 'postgres' \
                --conn-password '1234a' || true

              airflow connections delete 'spark_default' || true
              airflow connections add 'spark_default' \
                --conn-type 'spark' \
                --conn-host 'spark://spark-master:7077' || true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
# -----------------------------------------------------------------------------
# Servicio para el servidor web de Airflow
# Expone la interfaz de administracion en el puerto 8080
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: airflow-webserver
    app.kubernetes.io/component: orquestacion
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: airflow-webserver
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# -----------------------------------------------------------------------------
# Deployment del servidor web de Airflow
# Proporciona la interfaz grafica para monitorear DAGs y tareas
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: airflow-webserver
    app.kubernetes.io/component: orquestacion
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-webserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-webserver
        app.kubernetes.io/component: orquestacion
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Esperar a que el Job de inicializacion se haya completado manualmente
      # o usar initContainers para verificar la disponibilidad de la BD
      initContainers:
        - name: esperar-postgres-airflow
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que PostgreSQL Airflow este disponible..."
              until nc -z postgres-airflow 5432; do
                echo "PostgreSQL no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "PostgreSQL disponible."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: webserver
          image: restaurantes-olap-airflow:latest
          imagePullPolicy: IfNotPresent
          command: ["airflow", "webserver"]
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW__WEBSERVER__SECRET_KEY
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__FERNET_KEY
            - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
            - name: AIRFLOW__API__AUTH_BACKENDS
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__API__AUTH_BACKENDS
            - name: PYTHONPATH
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: PYTHONPATH
            - name: SPARK_WAREHOUSE
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: SPARK_WAREHOUSE
            - name: HADOOP_USER_NAME
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: HADOOP_USER_NAME
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Verificacion de salud usando el endpoint nativo de Airflow
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
# -----------------------------------------------------------------------------
# Deployment del scheduler de Airflow
# Ejecuta y programa las tareas definidas en los DAGs
# No expone puertos externos, se comunica con la BD y el webserver
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: airflow-scheduler
    app.kubernetes.io/component: orquestacion
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-scheduler
        app.kubernetes.io/component: orquestacion
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Esperar dependencias antes de iniciar el scheduler
      initContainers:
        - name: esperar-postgres-airflow
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que PostgreSQL Airflow este disponible..."
              until nc -z postgres-airflow 5432; do
                echo "PostgreSQL no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "PostgreSQL disponible."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: scheduler
          image: restaurantes-olap-airflow:latest
          imagePullPolicy: IfNotPresent
          command: ["airflow", "scheduler"]
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__EXECUTOR
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: AIRFLOW__WEBSERVER__SECRET_KEY
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__FERNET_KEY
            - name: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__CORE__LOAD_EXAMPLES
            - name: AIRFLOW__API__AUTH_BACKENDS
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: AIRFLOW__API__AUTH_BACKENDS
            - name: PYTHONPATH
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: PYTHONPATH
            - name: SPARK_WAREHOUSE
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: SPARK_WAREHOUSE
            - name: HADOOP_USER_NAME
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: HADOOP_USER_NAME
          # El scheduler no tiene UI pero se puede verificar con el comando nativo
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - 'airflow jobs check --job-type SchedulerJob --hostname "$(hostname)"'
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - 'airflow jobs check --job-type SchedulerJob --hostname "$(hostname)"'
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
