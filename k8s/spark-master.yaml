# =============================================================================
# Apache Spark Master - Nodo maestro del cluster de procesamiento distribuido
# Coordina la ejecucion de trabajos Spark (ETL, analisis de tendencias,
# horarios pico, crecimiento) sobre el Data Warehouse en HDFS.
# Bitnami Spark 3.5 con integracion a Hive Metastore.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: spark-master
    app.kubernetes.io/component: procesamiento
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spark-master
  ports:
    - name: spark-rpc
      port: 7077
      targetPort: 7077
      protocol: TCP
    - name: web-ui
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: spark-ui-1
      port: 4041
      targetPort: 4041
      protocol: TCP
    - name: spark-ui-2
      port: 4042
      targetPort: 4042
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: spark-master
    app.kubernetes.io/component: procesamiento
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-master
        app.kubernetes.io/component: procesamiento
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Contenedor de inicializacion: esperar a que HDFS este disponible
      initContainers:
        - name: esperar-hdfs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que HDFS NameNode este disponible..."
              until nc -z hdfs-namenode 9000; do
                echo "HDFS no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "HDFS disponible. Iniciando Spark Master."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: spark-master
          image: bitnami/spark:3.5
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          env:
            - name: SPARK_MODE
              value: "master"
            - name: HADOOP_USER_NAME
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: HADOOP_USER_NAME
          ports:
            - name: spark-rpc
              containerPort: 7077
              protocol: TCP
            - name: web-ui
              containerPort: 8080
              protocol: TCP
            - name: spark-ui-1
              containerPort: 4041
              protocol: TCP
            - name: spark-ui-2
              containerPort: 4042
              protocol: TCP
          # Verificacion de salud del puerto de comunicacion RPC
          livenessProbe:
            tcpSocket:
              port: 7077
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7077
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
