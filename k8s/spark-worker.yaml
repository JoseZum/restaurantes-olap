# =============================================================================
# Apache Spark Worker - Nodos de ejecucion del cluster de procesamiento
# Ejecuta las tareas distribuidas asignadas por el Spark Master.
# Configurado con 6 cores y 18Gi de memoria por worker segun los
# requerimientos del sistema de analisis del Data Warehouse.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: spark-worker
    app.kubernetes.io/component: procesamiento
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  # Replicas configurables: 1 minimo, escalar a 2 segun carga
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-worker
        app.kubernetes.io/component: procesamiento
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Distribuir workers en nodos distintos para mejor rendimiento
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - spark-worker
                topologyKey: kubernetes.io/hostname
      # Contenedores de inicializacion: esperar dependencias criticas
      initContainers:
        - name: esperar-spark-master
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que Spark Master este disponible..."
              until nc -z spark-master 7077; do
                echo "Spark Master no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "Spark Master disponible. Iniciando Worker."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: esperar-hdfs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que HDFS NameNode este disponible..."
              until nc -z hdfs-namenode 9000; do
                echo "HDFS no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "HDFS disponible."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: spark-worker
          image: bitnami/spark:3.5
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          env:
            - name: SPARK_MODE
              value: "worker"
            - name: SPARK_MASTER_URL
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: SPARK_MASTER_URL
            - name: SPARK_WORKER_CORES
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: SPARK_WORKER_CORES
            - name: SPARK_WORKER_MEMORY
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: SPARK_WORKER_MEMORY
            - name: HADOOP_USER_NAME
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: HADOOP_USER_NAME
          ports:
            - name: worker-ui
              containerPort: 8081
              protocol: TCP
          # Verificacion de salud via UI del worker
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          # Limites de recursos segun especificacion: 6 cores, 18Gi memoria
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
            limits:
              cpu: "6"
              memory: 18Gi
