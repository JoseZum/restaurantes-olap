# =============================================================================
# Apache Hive - Data Warehouse sobre HDFS
# Proporciona HiveServer2 (JDBC/ODBC) y Hive Metastore (Thrift) para
# consultas SQL sobre el almacen de datos distribuido.
# Se despliega como Deployment ya que no requiere identidad de red estable.
# Depende de: postgres-metastore (catalogo) y hdfs-namenode (almacenamiento).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hive
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/component: data-warehouse
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hive
  ports:
    - name: hiveserver2
      port: 10000
      targetPort: 10000
      protocol: TCP
    - name: metastore
      port: 9083
      targetPort: 9083
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive
  namespace: restaurantes-olap
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/component: data-warehouse
    app.kubernetes.io/part-of: restaurantes-olap
spec:
  replicas: 1
  # Estrategia Recreate porque solo una instancia puede usar el metastore
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive
        app.kubernetes.io/component: data-warehouse
        app.kubernetes.io/part-of: restaurantes-olap
    spec:
      # Contenedores de inicializacion para verificar dependencias
      initContainers:
        # Paso 1: Esperar a que el metastore de PostgreSQL este disponible
        - name: esperar-postgres-metastore
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que PostgreSQL Metastore este disponible..."
              until nc -z postgres-metastore 5432; do
                echo "PostgreSQL Metastore no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "PostgreSQL Metastore disponible."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        # Paso 2: Esperar a que el NameNode de HDFS este disponible
        - name: esperar-hdfs-namenode
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a que HDFS NameNode este disponible..."
              until nc -z hdfs-namenode 9000; do
                echo "HDFS NameNode no disponible, reintentando en 5 segundos..."
                sleep 5
              done
              echo "HDFS NameNode disponible."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: hive
          # Imagen personalizada construida desde ./hive/Dockerfile
          # En produccion, reemplazar con la URL del registro de contenedores
          image: restaurantes-olap-hive:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          env:
            - name: DATABASE_TYPE
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: DATABASE_TYPE
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: DATABASE_PORT
            - name: DATABASE_DB
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: DATABASE_DB
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: olap-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: olap-secrets
                  key: HIVE_METASTORE_PASSWORD
          ports:
            - name: hiveserver2
              containerPort: 10000
              protocol: TCP
            - name: metastore
              containerPort: 9083
              protocol: TCP
          # Verificacion de salud: comprobar acceso a HDFS warehouse
          livenessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 9083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
