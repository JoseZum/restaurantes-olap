services:
  neo4j:
    image: neo4j:5.25.1
    container_name: neo4j-restaurantes
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/restaurantes123
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./import:/var/lib/neo4j/import
      - ./plugins:/plugins
      - ./conf:/var/lib/neo4j/conf
    networks:
      - neo4j-network

  # API de Rutas Óptimas
  neo4j-rutas-api:
    build:
      context: ./rutas_api
      dockerfile: Dockerfile
    container_name: neo4j-rutas-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=restaurantes123
    depends_on:
      - neo4j
    networks:
      - neo4j-network
    restart: unless-stopped

  # Contenedor para scripts de inicialización
  neo4j-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: neo4j-init
    depends_on:
      - neo4j
    volumes:
      - ../spark/data:/data
      - ./scripts:/scripts
      - ./import:/import
    networks:
      - neo4j-network
    profiles:
      - init

networks:
  neo4j-network:
    driver: bridge 